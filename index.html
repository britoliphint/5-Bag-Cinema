<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tomboatwater.com | VFA Archivist</title>
    <style>
        :root {
            --vcr-green: #00ff41;
            --vcr-green-dim: rgba(0, 255, 65, 0.2);
            --bg-dark: #050505;
            /* Format Colors */
            --color-4k: #ffd700;    /* Gold */
            --color-bluray: #00d4ff; /* Cyber Blue */
            --color-dvd: #ff4500;    /* Industrial Orange/Red */
            --color-vhs: #ff00ff;    /* Retro Magenta */
            --color-default: var(--vcr-green);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(rgba(0,10,5,0.85), rgba(0,10,5,0.85)),
                        url('https://images.unsplash.com/photo-1620021666992-a1f7c00609b1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--vcr-green);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        header {
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid var(--vcr-green);
            padding: 15px 10px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }

        h1 { letter-spacing: 3px; font-size: 1.1rem; margin: 0 0 10px 0; }

        #searchBar {
            width: 95%; max-width: 600px;
            background: #000;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            padding: 12px;
            font-size: 1rem;
            text-transform: uppercase;
            outline: none;
            box-shadow: 0 0 10px var(--vcr-green-dim);
        }

        .genre-console {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .genre-btn {
            background: #000;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            padding: 6px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .genre-btn.active { background: var(--vcr-green); color: #000; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        @media (min-width: 1024px) {
            .movie-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 1200px;
                margin: 0 auto;
            }
        }

        .tape-case {
            background: #000;
            border: 1px solid #222;
            padding: 5px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .tape-case:hover { border-color: var(--vcr-green); transform: translateY(-5px); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* UPGRADED FORMAT BADGE */
        .format-badge {
            position: absolute; 
            top: 8px; 
            right: 8px;
            color: #000;
            font-size: 0.7rem; /* Slightly bigger */
            padding: 4px 8px;  /* More "Button-like" */
            font-weight: 900;
            text-transform: uppercase;
            z-index: 10;
            border: 1px solid #000;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        /* FORMAT COLOR CLASSES */
        .badge-4k { background-color: var(--color-4k); box-shadow: 0 0 10px var(--color-4k); }
        .badge-bluray { background-color: var(--color-bluray); box-shadow: 0 0 10px var(--color-bluray); }
        .badge-dvd { background-color: var(--color-dvd); box-shadow: 0 0 10px var(--color-dvd); }
        .badge-vhs { background-color: var(--color-vhs); box-shadow: 0 0 10px var(--color-vhs); }
        .badge-default { background-color: var(--color-default); }

        /* MODAL */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .dossier-window {
            background: #050505;
            border: 2px solid var(--vcr-green);
            width: 95%; max-width: 850px;
            max-height: 90vh;
            overflow-y: auto;
            display: flex; flex-wrap: wrap;
            position: relative;
        }

        .dossier-poster { flex: 1 1 300px; max-height: 500px; object-fit: contain; border-right: 1px solid var(--vcr-green); }
        .dossier-content { flex: 1 1 350px; padding: 25px; display: flex; flex-direction: column; }
        .dossier-title { font-size: 1.5rem; border-bottom: 2px solid var(--vcr-green); margin-bottom: 15px; }
        .data-line { margin: 8px 0; font-size: 0.9rem; }
        .label { color: #666; text-transform: uppercase; margin-right: 8px; font-weight: bold; }
        .imdb-btn { margin-top: auto; padding: 12px; border: 1px solid var(--vcr-green); color: var(--vcr-green); text-decoration: none; text-align: center; font-weight: bold; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: var(--vcr-green); cursor: pointer; z-index: 10001; }

        @media (max-width: 768px) {
            .genre-console { justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto; margin-top: 10px; }
            .dossier-window { width: 100%; height: 100%; max-height: 100vh; border: none; }
            .dossier-poster { border-right: none; border-bottom: 1px solid var(--vcr-green); max-height: 40vh; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SEAGAL CINEMA</h1>
        <input type="text" id="searchBar" placeholder="SEARCH ARCHIVE...">
        <div id="genreContainer" class="genre-console"></div>
    </header>

    <div class="movie-grid" id="movieGrid"></div>

    <div id="modalOverlay">
        <div class="dossier-window">
            <span class="close-btn" onclick="closeDossier()">[X] CLOSE</span>
            <img id="modalPoster" class="dossier-poster" src="" alt="">
            <div class="dossier-content">
                <div class="dossier-title" id="modalTitle"></div>
                <div class="data-line"><span class="label">FORMAT:</span> <span id="modalFormat" style="color:#fff;"></span></div>
                <div class="data-line"><span class="label">RATING:</span> <span id="modalRating"></span>/5</div>
                <div class="data-line"><span class="label">GENRE:</span> <span id="modalGenre"></span></div>
                <div class="data-line"><span class="label">YEAR:</span> <span id="modalYear"></span></div>
                <div class="data-line"><span class="label">DIRECTOR:</span> <span id="modalDirector"></span></div>
                <div class="data-line"><span class="label">CAST:</span> <span id="modalActors"></span></div>
                <a href="#" id="modalImdb" target="_blank" class="imdb-btn">[ > ] ACCESS IMDB_DATABASE</a>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0lCS-r1idsXlI-r1hzwww4jLVWuCiKlSYCrua2uMKCN_L8xipIXaMhpWYOw8PpeW8M6gHcHd3bA7V/pub?gid=0&single=true&output=csv';

        let allMovies = [];
        let currentGenre = 'ALL';

        async function loadMovies() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allMovies = [];
                const genres = new Set(['ALL']);

                rows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length < 9) return; 
                    const clean = col.map(c => c.replace(/^"|"$/g, '').trim());
                    
                    const movie = {
                        title: clean[0], genre: clean[1], year: clean[2], director: clean[3],
                        actors: clean[4], poster: clean[5], rating: clean[6], format: clean[7], imdbId: clean[8]
                    };

                    if (movie.poster.startsWith('http')) {
                        allMovies.push(movie);
                        movie.genre.split(',').forEach(g => genres.add(g.trim().toUpperCase()));
                    }
                });

                renderGenreToggles(Array.from(genres).sort());
                applyFilters();
            } catch (err) { console.error(err); }
        }

        function renderGenreToggles(genres) {
            const container = document.getElementById('genreContainer');
            container.innerHTML = '';
            genres.forEach(g => {
                const btn = document.createElement('button');
                btn.className = `genre-btn ${currentGenre === g ? 'active' : ''}`;
                btn.innerText = g;
                btn.onclick = () => { currentGenre = g; applyFilters(); };
                container.appendChild(btn);
            });
        }

        // Helper to get color class based on text
        function getFormatClass(format) {
            const f = format.toLowerCase();
            if (f.includes('4k')) return 'badge-4k';
            if (f.includes('blu-ray') || f.includes('bluray')) return 'badge-bluray';
            if (f.includes('dvd')) return 'badge-dvd';
            if (f.includes('vhs')) return 'badge-vhs';
            return 'badge-default';
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';

            allMovies.forEach(movie => {
                const matchesGenre = currentGenre === 'ALL' || movie.genre.toUpperCase().includes(currentGenre);
                const matchesSearch = movie.title.toLowerCase().includes(searchTerm) || 
                                      movie.actors.toLowerCase().includes(searchTerm);

                if (matchesGenre && matchesSearch) {
                    const card = document.createElement('div');
                    card.className = 'tape-case';
                    card.onclick = () => openDossier(movie);
                    
                    // Assign the dynamic color class
                    const colorClass = getFormatClass(movie.format);
                    const formatBadge = movie.format ? `<div class="format-badge ${colorClass}">${movie.format}</div>` : '';
                    
                    card.innerHTML = `
                        ${formatBadge}
                        <img class="poster" src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=DATA+CORRUPT'">
                    `;
                    grid.appendChild(card);
                }
            });

            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === currentGenre);
            });
        }

        function openDossier(movie) {
            document.getElementById('modalTitle').innerText = movie.title.toUpperCase();
            document.getElementById('modalFormat').innerText = movie.format || 'DIGITAL';
            document.getElementById('modalRating').innerText = movie.rating || 'N/A';
            document.getElementById('modalGenre').innerText = movie.genre;
            document.getElementById('modalYear').innerText = movie.year;
            document.getElementById('modalDirector').innerText = movie.director;
            document.getElementById('modalActors').innerText = movie.actors;
            document.getElementById('modalPoster').src = movie.poster;

            let finalLink = movie.imdbId.trim();
            if (finalLink && !finalLink.startsWith('http')) {
                finalLink = `https://www.imdb.com/title/${finalLink}/`;
            }
            document.getElementById('modalImdb').href = finalLink;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeDossier() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = (event) => { if (event.target == document.getElementById('modalOverlay')) closeDossier(); }
        document.getElementById('searchBar').addEventListener('input', applyFilters);
        loadMovies();
    </script>
</body>
</html>
