<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-BAG CINEMA | NEON ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --bg-black: #050505;
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-cyan);
            font-family: 'VT323', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(transparent 0%, var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, transparent 0%, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* CRT Scanline & Curved Glass Glare Overlays */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)),
                        radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0) 40%),
                        radial-gradient(circle at center, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 9999;
            background-size: 100% 4px, 3px 100%, 100% 100%, 100% 100%;
            pointer-events: none;
            transition: background 0.05s ease;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 3px solid var(--neon-pink);
            padding: 30px 10px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 0 20px var(--neon-pink);
            transition: transform 0.3s ease-in-out;
        }

        header.header-hidden {
            transform: translateY(-100%);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 5px;
            margin: 0 0 15px 0;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            font-style: italic;
        }

        .search-container {
            display: flex;
            max-width: 650px;
            margin: 0 auto;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 90%;
        }

        #searchBar {
            flex: 1;
            background: #000;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            font-size: 1.5rem;
            font-family: 'VT323', monospace;
            outline: none;
            box-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase;
        }

        .random-btn {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 11px 15px;
            font-size: 1.3rem;
            font-family: 'VT323', monospace;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
            transition: all 0.2s ease;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .random-btn:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 20px var(--neon-pink);
            text-shadow: 0 0 5px #fff;
        }

        .genre-console {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin-top: 20px;
        }

        .genre-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'VT323', monospace;
        }

        .genre-btn.active {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .status-counter-panel {
            max-width: 600px;
            margin: 25px auto 0 auto;
            border: 1px solid var(--neon-cyan);
            background: rgba(0,0,0,0.8);
            padding: 5px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .stat-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--neon-cyan);
            padding: 6px 12px;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .stat-btn span {
            color: #fff;
            font-weight: bold;
            margin-left: 4px;
        }

        .stat-btn:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .stat-btn.active {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
            color: #fff;
            text-shadow: 0 0 8px var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        #debugMessage {
            text-align: center; margin-top: 50px; font-size: 1.5rem; color: var(--neon-pink);
        }

        .tape-case {
            background: #000;
            border: 2px solid #222;
            padding: 8px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            box-shadow: 5px 5px 0px var(--neon-purple);
        }

        .tape-case:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; filter: contrast(1.1) brightness(0.9); }

        .format-badge {
            position: absolute; top: 15px; right: 15px;
            font-family: 'Orbitron', sans-serif; font-size: 0.6rem; padding: 4px 8px;
            background: var(--neon-pink); color: #fff; font-weight: 900;
            z-index: 10; box-shadow: 2px 2px 0px #000;
        }

        /* VCR STATIC GLITCH LAYER */
        #vhsGlitchOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 99999;
            opacity: 0.95;
            overflow: hidden;
        }

        .vhs-static-line {
            position: absolute;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px #fff;
            animation: glitchLines 0.4s infinite linear;
        }

        @keyframes glitchLines {
            0% { top: -10%; background-color: rgba(255,255,255,0.2); }
            50% { background-color: rgba(255, 255, 255, 0.8); }
            100% { top: 110%; }
        }

        .vcr-shake {
            animation: vcrTremor 0.15s infinite;
        }

        @keyframes vcrTremor {
            0% { transform: translate(1px, 1px) rotate(0deg); filter: hue-rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); filter: hue-rotate(90deg); }
            60% { transform: translate(0px, 2px) rotate(0deg); }
            80% { transform: translate(2px, -1px) rotate(1deg); filter: hue-rotate(180deg); }
            100% { transform: translate(-1px, 1px) rotate(-1deg); }
        }

        /* MODAL SCREEN FIX CODES */
        #modalOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 10000;
            justify-content: center; align-items: center;
            padding: 10px; box-sizing: border-box;
        }

        .dossier-window {
            background: #000; border: 3px solid var(--neon-cyan);
            width: 95%; max-width: 900px; max-height: 85vh;
            display: flex; flex-wrap: wrap;
            box-shadow: 0 0 30px var(--neon-cyan); position: relative;
            overflow: hidden; /* Stops inner layers from tearing through glow boundary */
        }

        .dossier-poster { flex: 1 1 350px; max-height: 85vh; object-fit: contain; border-right: 3px solid var(--neon-cyan); background: #000; }
        
        .dossier-content { 
            flex: 1 1 400px; padding: 40px; display: flex; flex-direction: column; color: #fff; 
            max-height: 85vh; overflow-y: auto; box-sizing: border-box;
        }
        
        .dossier-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--neon-pink); margin-bottom: 20px; text-transform: uppercase; line-height: 1.2; }
        .data-point { margin-bottom: 12px; font-size: 1.3rem; border-left: 4px solid var(--neon-purple); padding-left: 15px; }
        .label { color: var(--neon-cyan); text-transform: uppercase; margin-right: 10px; font-size: 0.9rem; }
        .imdb-link { margin-top: 20px; padding: 15px; background: var(--neon-cyan); color: #000; text-decoration: none; text-align: center; font-weight: bold; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        .imdb-link:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }
        .close-btn { position: absolute; top: 10px; right: 20px; color: var(--neon-pink); font-size: 2rem; cursor: pointer; z-index: 101; text-shadow: 0 0 5px var(--neon-pink); }

        /* ADVANCED TARGETED MOBILE RESPONSIVE MATRIX OVERHAULS */
        @media (max-width: 768px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
            
            /* Clamps total pop-up size so it doesn't leak off small mobile screens */
            .dossier-window { 
                flex-direction: column; 
                max-height: 80vh; 
                width: 100%;
                overflow-y: auto; /* Fallback frame scroll */
            }
            
            .dossier-poster { 
                border-right: none; 
                border-bottom: 3px solid var(--neon-cyan); 
                max-height: 35vh; 
                width: 100%;
                flex: none;
            }
            
            /* Isolate scrolling entirely to the details box so the layout is bulletproof */
            .dossier-content { 
                padding: 20px; 
                max-height: none; 
                overflow-y: visible;
                flex: 1;
            }
            
            /* Keep close button pinned and static relative to viewport */
            .close-btn {
                position: fixed;
                top: 15px;
                right: 20px;
                background: rgba(0,0,0,0.85);
                border: 1px solid var(--neon-pink);
                padding: 2px 10px;
                font-size: 1.5rem;
                box-shadow: 0 0 10px var(--neon-pink);
            }
            
            .dossier-title { font-size: 1.6rem; padding-right: 40px; }
            .data-point { font-size: 1.1rem; margin-bottom: 8px; }
            .status-counter-panel { font-size: 1.1rem; width: 95%; flex-wrap: wrap; justify-content: center; gap: 2px; }
            .stat-btn { font-size: 1.1rem; padding: 4px 6px; }
            .search-container { flex-direction: column; width: 95%; gap: 8px; }
            #searchBar { width: 100%; box-sizing: border-box; }
            .random-btn { width: 100%; box-sizing: border-box; text-align: center; padding: 10px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1>5_BAG_VAULT</h1>
        
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="SCANNING DATABASE...">
            <button class="random-btn" onclick="triggerVhsRandomizer()">[ AUTO_LOAD_TAPE ]</button>
        </div>

        <div id="genreContainer" class="genre-console"></div>
        
        <div class="status-counter-panel" id="counterPanel" style="display:none;">
            <button class="stat-btn active" id="btnAll" onclick="setFormatFilter('ALL')">TOTAL_ARCHIVE:<span id="statTotal">0</span></button>
            <button class="stat-btn" id="btn4k" onclick="setFormatFilter('4K')">4K:<span id="stat4k">0</span></button>
            <button class="stat-btn" id="btnBlu" onclick="setFormatFilter('BLU')">BLU:<span id="statBlu">0</span></button>
            <button class="stat-btn" id="btnDvd" onclick="setFormatFilter('DVD')">DVD:<span id="statDvd">0</span></button>
        </div>
    </header>

    <div id="vhsGlitchOverlay">
        <div class="vhs-static-line" style="animation-delay: 0s;"></div>
        <div class="vhs-static-line" style="animation-delay: -0.15s; height: 15px; background: rgba(255,255,255,0.3);"></div>
        <div class="vhs-static-line" style="animation-delay: -0.3s; height: 4px;"></div>
        <div style="position: absolute; top:45%; width:100%; text-align:center; color:#fff; font-size:3rem; font-family:'Orbitron', sans-serif; letter-spacing:5px; text-shadow:0 0 10px var(--neon-pink);">TRACKING...</div>
    </div>

    <div id="debugMessage">INITIATING BOOT SEQUENCE...</div>
    <div class="movie-grid" id="movieGrid"></div>

    <div id="modalOverlay">
        <div class="dossier-window">
            <span class="close-btn" onclick="closeModal()">[X]</span>
            <img id="modalPoster" class="dossier-poster" src="" alt="">
            <div class="dossier-content">
                <div class="dossier-title" id="modalTitle"></div>
                <div class="data-point"><span class="label">EDITION:</span> <span id="modalFormat"></span></div>
                <div class="data-point"><span class="label">GENRE:</span> <span id="modalGenre"></span></div>
                <div class="data-point"><span class="label">YEAR:</span> <span id="modalYear"></span></div>
                <div class="data-point"><span class="label">DIRECTOR:</span> <span id="modalDirector"></span></div>
                <div class="data-point"><span class="label">CAST:</span> <span id="modalActors"></span></div>
                <a href="#" id="modalImdb" target="_blank" class="imdb-link">VIEW_DATABASE_ENTRY</a>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0lCS-r1idsXlI-r1hzwww4jLVWuCiKlSYCrua2uMKCN_L8xipIXaMhpWYOw8PpeW8M6gHcHd3bA7V/pub?gid=0&single=true&output=csv';

        let movies = [];
        let currentGenre = 'ALL';
        let currentFormat = 'ALL';
        let activePool = [];

        // Interactive CRT Glass Glare Tracking Engine
        window.addEventListener('mousemove', (e) => {
            const xPercent = (e.clientX / window.innerWidth) * 100;
            const yPercent = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${xPercent}%`);
            document.documentElement.style.setProperty('--mouse-y', `${yPercent}%`);
        });

        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                const xPercent = (e.touches[0].clientX / window.innerWidth) * 100;
                const yPercent = (e.touches[0].clientY / window.innerHeight) * 100;
                document.documentElement.style.setProperty('--mouse-x', `${xPercent}%`);
                document.documentElement.style.setProperty('--mouse-y', `${yPercent}%`);
            }
        });

        // Mobile Scroll-to-Hide Controller
        let lastScrollY = window.scrollY;
        const header = document.getElementById('mainHeader');

        window.addEventListener('scroll', () => {
            if (window.innerWidth <= 768) {
                if (window.scrollY > lastScrollY && window.scrollY > 100) {
                    header.classList.add('header-hidden');
                } else {
                    header.classList.remove('header-hidden');
                }
            } else {
                header.classList.remove('header-hidden');
            }
            lastScrollY = window.scrollY;
        });

        async function fetchMovies() {
            const debug = document.getElementById('debugMessage');
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                
                movies = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 9) return null;
                    const clean = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    return {
                        title: clean[0], genre: clean[1], year: clean[2], director: clean[3],
                        actors: clean[4], poster: clean[5], rating: clean[6], format: clean[7], imdb: clean[8]
                    };
                }).filter(m => m && m.poster && m.poster.toLowerCase().startsWith('http'));

                if (movies.length === 0) {
                    debug.innerText = "ERROR: DATABASE EMPTY OR CORRUPT";
                } else {
                    debug.style.display = 'none';
                    document.getElementById('counterPanel').style.display = 'flex';
                    const genres = ['ALL', ...new Set(movies.map(m => m.genre.split(',')[0].trim().toUpperCase()))];
                    renderGenres(genres.sort());
                    renderGrid();
                }
            } catch (e) { 
                debug.innerText = "SYSTEM_FAILURE: " + e.message;
            }
        }

        function renderGenres(genres) {
            const container = document.getElementById('genreContainer');
            container.innerHTML = genres.map(g => `<button class="genre-btn ${currentGenre === g ? 'active' : ''}" onclick="setGenre('${g}')">${g}</button>`).join('');
        }

        function setGenre(g) {
            currentGenre = g;
            const uniqueGenres = ['ALL', ...new Set(movies.map(m => m.genre.split(',')[0].trim().toUpperCase()))];
            renderGenres(uniqueGenres.sort());
            renderGrid();
        }

        function setFormatFilter(fmt) {
            currentFormat = fmt;
            document.getElementById('btnAll').classList.toggle('active', fmt === 'ALL');
            document.getElementById('btn4k').classList.toggle('active', fmt === '4K');
            document.getElementById('btnBlu').classList.toggle('active', fmt === 'BLU');
            document.getElementById('btnDvd').classList.toggle('active', fmt === 'DVD');
            renderGrid();
        }

        function updateCounters(baseFilteredMovies) {
            document.getElementById('statTotal').innerText = baseFilteredMovies.length;
            const counts = { k4: 0, blu: 0, dvd: 0 };
            baseFilteredMovies.forEach(m => {
                const fmt = (m.format || '').toLowerCase();
                if (fmt.includes('4k')) counts.k4++;
                else if (fmt.includes('blu')) counts.blu++;
                else if (fmt.includes('dvd')) counts.dvd++;
            });
            document.getElementById('stat4k').innerText = counts.k4;
            document.getElementById('statBlu').innerText = counts.blu;
            document.getElementById('statDvd').innerText = counts.dvd;
        }

        function renderGrid() {
            const search = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('movieGrid');
            
            const baseFiltered = movies.filter(m => {
                const matchesGenre = currentGenre === 'ALL' || m.genre.toUpperCase().includes(currentGenre);
                const matchesSearch = m.title.toLowerCase().includes(search) || m.actors.toLowerCase().includes(search);
                return matchesGenre && matchesSearch;
            });

            updateCounters(baseFiltered);

            activePool = baseFiltered.filter(m => {
                if (currentFormat === 'ALL') return true;
                const fmt = (m.format || '').toLowerCase();
                if (currentFormat === '4K') return fmt.includes('4k');
                if (currentFormat === 'BLU') return fmt.includes('blu');
                if (currentFormat === 'DVD') return fmt.includes('dvd');
                return true;
            });

            grid.innerHTML = activePool.map(m => `
                <div class="tape-case" onclick='openModal(${JSON.stringify(m).replace(/'/g, "&apos;")})'>
                    <img src="${m.poster}" class="poster" onerror="this.src='https://via.placeholder.com/200x300?text=DATA_ERROR'">
                    <div class="format-badge">${m.format}</div>
                </div>
            `).join('');
        }

        function triggerVhsRandomizer() {
            if (activePool.length === 0) return;
            const glitchOverlay = document.getElementById('vhsGlitchOverlay');
            glitchOverlay.style.display = 'block';
            document.body.classList.add('vcr-shake');

            setTimeout(() => {
                const randomChoiceIndex = Math.floor(Math.random() * activePool.length);
                const chosenTape = activePool[randomChoiceIndex];
                glitchOverlay.style.display = 'none';
                document.body.classList.remove('vcr-shake');
                openModal(chosenTape);
            }, 1000);
        }

        function openModal(m) {
            document.getElementById('modalTitle').innerText = m.title;
            document.getElementById('modalPoster').src = m.poster;
            document.getElementById('modalFormat').innerText = m.format;
            document.getElementById('modalGenre').innerText = m.genre;
            document.getElementById('modalYear').innerText = m.year;
            document.getElementById('modalDirector').innerText = m.director;
            document.getElementById('modalActors').innerText = m.actors;
            document.getElementById('modalImdb').href = m.imdb.startsWith('http') ? m.imdb : `https://www.imdb.com/title/${m.imdb}`;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchBar').oninput = renderGrid;
        window.onclick = (event) => { if (event.target == document.getElementById('modalOverlay')) closeModal(); }
        fetchMovies();
    </script>
</body>
</html>
