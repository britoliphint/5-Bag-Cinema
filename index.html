<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tomboatwater.com | VFA Archivist</title>
    <style>
        :root {
            --vcr-green: #00ff41;
            --vcr-green-dim: rgba(0, 255, 65, 0.2);
            --bg-dark: #0a0a0a;
            --text-main: #f0e6d2;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(rgba(0,10,5,0.85), rgba(0,10,5,0.85)),
                        url('https://images.unsplash.com/photo-1620021666992-a1f7c00609b1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-attachment: fixed;
            color: var(--vcr-green);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* SEARCHBAR & HEADER */
        header {
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--vcr-green);
            padding: 20px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }

        #searchBar {
            width: 80%; max-width: 600px;
            background: #000;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            padding: 12px;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--vcr-green-dim);
        }

        /* THE GRID: Flexible for mobile, locked for desktop */
.movie-grid {
    display: grid;
    /* Mobile default: fill as many as fit at 140px wide */
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
    gap: 30px;
    padding: 30px;
}

/* DESKTOP UPGRADE: Force exactly 4 per row on larger screens */
@media (min-width: 1024px) {
    .movie-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 1400px; /* Keeps the posters from getting TOO gargantuan on ultra-wide monitors */
        margin: 0 auto;   /* Centers the grid */
    }
}

        .tape-case {
            background: #000;
            border: 1px solid #333;
            padding: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .tape-case:hover {
            border-color: var(--vcr-green);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--vcr-green-dim);
        }

        .poster {
            width: 100%; aspect-ratio: 2/3;
            object-fit: cover;
            filter: grayscale(30%) contrast(1.2);
        }

        /* NOSTROMO DOSSIER (MODAL) */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .dossier-window {
            background: #050505;
            border: 2px solid var(--vcr-green);
            width: 90%; max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            display: flex; flex-wrap: wrap;
            box-shadow: 0 0 30px var(--vcr-green-dim);
            animation: flicker 0.15s infinite secondary;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        .dossier-poster {
            flex: 1 1 300px;
            max-height: 500px;
            object-fit: contain;
            background: #000;
            border-right: 1px solid var(--vcr-green);
        }

        .dossier-content {
            flex: 1 1 300px;
            padding: 30px;
            display: flex; flex-direction: column;
        }

        .dossier-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--vcr-green);
        }

        .data-line { margin: 8px 0; font-size: 0.9rem; }
        .label { color: #888; text-transform: uppercase; margin-right: 5px; }

        .imdb-btn {
            margin-top: 20px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
        }

        .imdb-btn:hover {
            background: var(--vcr-green);
            color: #000;
        }

        .close-btn {
            position: absolute; top: 10px; right: 15px;
            font-size: 1.5rem; cursor: pointer; color: var(--vcr-green);
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 600px) {
            .dossier-window { width: 100%; height: 100%; max-height: 100vh; border: none; }
            .dossier-poster { border-right: none; border-bottom: 1px solid var(--vcr-green); }
        }
    </style>
</head>
<body>

    <header>
        <h1>TOMBOATWATER ARCHIVE</h1>
        <input type="text" id="searchBar" placeholder="RETRIEVE DATA: SEARCH TITLES, CAST, OR GENRE...">
    </header>

    <div class="movie-grid" id="movieGrid"></div>

    <div id="modalOverlay">
        <div class="dossier-window">
            <span class="close-btn" onclick="closeDossier()">[X]</span>
            <img id="modalPoster" class="dossier-poster" src="" alt="">
            <div class="dossier-content">
                <div class="dossier-title" id="modalTitle">LOADING...</div>
                <div class="data-line"><span class="label">GENRE:</span> <span id="modalGenre"></span></div>
                <div class="data-line"><span class="label">YEAR:</span> <span id="modalYear"></span></div>
                <div class="data-line"><span class="label">DIRECTOR:</span> <span id="modalDirector"></span></div>
                <div class="data-line"><span class="label">CAST:</span> <span id="modalActors"></span></div>
                <div class="data-line"><span class="label">RATING:</span> <span id="modalRating"></span></div>
                <a href="#" id="modalImdb" target="_blank" class="imdb-btn">[ > ] ACCESS IMDB_DATABASE</a>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0lCS-r1idsXlI-r1hzwww4jLVWuCiKlSYCrua2uMKCN_L8xipIXaMhpWYOw8PpeW8M6gHcHd3bA7V/pub?gid=0&single=true&output=csv';

        async function loadMovies() {
    const response = await fetch(SHEET_URL);
    const data = await response.text();
    
    // This splits the sheet into rows
    const rows = data.split(/\r?\n/).slice(1);
    const grid = document.getElementById('movieGrid');
    grid.innerHTML = '';

    rows.forEach(row => {
        // This Regex handles commas inside quotes so your data doesn't "shift"
        const col = row.match(/(".*?"|[^",\s][^",]*|(?<=,|^)(?=,|$))/g);
        
        if (!col || col.length < 8) return;

        // Clean up quotes from the data
        const clean = col.map(c => c.replace(/^"|"$/g, '').trim());

        const [title, genre, year, director, actors, poster, rating, imdbId] = clean;

        // Check if poster URL exists and looks like a link
        if (!poster || !poster.startsWith('http')) return;

        const card = document.createElement('div');
        card.className = 'tape-case';
        card.onclick = () => openDossier(title, genre, year, director, actors, poster, rating, imdbId);
        
        card.innerHTML = `<img class="poster" src="${poster}" alt="${title}" onerror="this.src='https://via.placeholder.com/200x300?text=DATA+CORRUPT'">`;
        card.dataset.tags = `${title} ${actors} ${genre} ${director}`.toLowerCase();
        
        grid.appendChild(card);
    });
}

        function openDossier(title, genre, year, director, actors, poster, rating, imdbId) {
            document.getElementById('modalTitle').innerText = title.toUpperCase();
            document.getElementById('modalGenre').innerText = genre;
            document.getElementById('modalYear').innerText = year;
            document.getElementById('modalDirector').innerText = director;
            document.getElementById('modalActors').innerText = actors;
            document.getElementById('modalRating').innerText = rating;
            document.getElementById('modalPoster').src = poster;
            
            // Construct IMDb link
            document.getElementById('modalImdb').href = `https://www.imdb.com/title/${imdbId.trim()}/`;
            
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeDossier() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Close on background click
        window.onclick = (event) => {
            if (event.target == document.getElementById('modalOverlay')) closeDossier();
        }

        // Search logic
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.tape-case').forEach(card => {
                card.style.display = card.dataset.tags.includes(term) ? 'block' : 'none';
            });
        });

        loadMovies();
    </script>
</body>
</html>
