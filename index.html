<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-BAG CINEMA | NEON ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Barcode+39&family=Orbitron:wght@400;900&family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --bg-black: #050505;
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-cyan);
            font-family: 'VT323', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(transparent 0%, var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, transparent 0%, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Ambient CRT Glass Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)),
                        radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0) 40%),
                        radial-gradient(circle at center, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 9999;
            pointer-events: none;
            transition: background 0.05s ease;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 3px solid var(--neon-pink);
            padding: 30px 10px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; margin: 0 0 15px 0; color: #fff; text-shadow: 0 0 10px var(--neon-pink); }

        .search-container { display: flex; max-width: 750px; margin: 0 auto; gap: 10px; justify-content: center; width: 90%; }
        #searchBar { flex: 1; background: #000; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); padding: 12px; font-size: 1.5rem; font-family: 'VT323', monospace; text-transform: uppercase; }

        .random-btn, .print-btn { background: transparent; border: 2px solid var(--neon-pink); color: var(--neon-pink); padding: 11px 15px; cursor: pointer; text-transform: uppercase; font-family: 'VT323', monospace; }
        .print-btn { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .tape-case { background: #000; border: 2px solid #222; padding: 8px; cursor: pointer; position: relative; box-shadow: 5px 5px 0px var(--neon-purple); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* Modal and Print Overlays */
        #modalOverlay, #receiptOverlay, #rewindOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 10000; justify-content: center; align-items: center;
        }

        .dossier-window { background: #000; border: 3px solid var(--neon-cyan); width: 90%; max-width: 900px; display: flex; padding: 20px; color: #fff; }
        .receipt-paper { background: #fdfdfd; color: #111; width: 90%; max-width: 400px; padding: 30px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1>5_BAG_VAULT</h1>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="SCANNING...">
            <button class="random-btn" onclick="triggerVhsRandomizer()">[ AUTO_LOAD ]</button>
            <button class="print-btn" onclick="generateReceiptManifest()">[ PRINT_MANIFEST ]</button>
        </div>
    </header>

    <div id="rewindOverlay"><div class="spools" style="display:flex; gap:40px;"><div class="spool" style="width:100px;height:100px;border:8px solid #ff00ff;border-radius:50%; animation:rapidRewind 0.4s linear infinite;"></div><div class="spool" style="width:100px;height:100px;border:8px solid #ff00ff;border-radius:50%; animation:rapidRewind 0.4s linear infinite;"></div></div></div>
    
    <div id="receiptOverlay"><div class="receipt-paper" id="receiptContent"></div></div>
    
    <div id="modalOverlay">
        <div class="dossier-window">
            <span onclick="closeModal()" style="position:absolute; top:10px; right:20px; cursor:pointer;">[X]</span>
            <img id="modalPoster" style="width:300px;">
            <div id="modalData" style="padding:20px;"></div>
        </div>
    </div>

    <div id="movieGrid" class="movie-grid"></div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0lCS-r1idsXlI-r1hzwww4jLVWuCiKlSYCrua2uMKCN_L8xipIXaMhpWYOw8PpeW8M6gHcHd3bA7V/pub?gid=0&single=true&output=csv';
        let movies = []; let activePool = [];

        // Mouse tracking for CRT glare
        window.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', `${(e.clientX / window.innerWidth) * 100}%`);
            document.documentElement.style.setProperty('--mouse-y', `${(e.clientY / window.innerHeight) * 100}%`);
        });

        async function fetchMovies() {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            movies = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { title: cols[0], genre: cols[1], year: cols[2], director: cols[3], actors: cols[4], poster: cols[5], format: cols[7], imdb: cols[8] };
            }).filter(m => m.title);
            activePool = movies;
            renderGrid();
        }

        function renderGrid() {
            const search = document.getElementById('searchBar').value.toLowerCase();
            activePool = movies.filter(m => m.title.toLowerCase().includes(search));
            document.getElementById('movieGrid').innerHTML = activePool.map(m => `
                <div class="tape-case" onclick='openModal(${JSON.stringify(m)})'>
                    <img src="${m.poster}" class="poster">
                </div>`).join('');
        }

        function openModal(m) {
            document.getElementById('modalPoster').src = m.poster;
            document.getElementById('modalData').innerHTML = `<h2>${m.title}</h2><p>Format: ${m.format}</p>`;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('rewindOverlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('rewindOverlay').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }, 400);
        }

        function generateReceiptManifest() {
            document.getElementById('receiptContent').innerHTML = `<h3>MANIFEST</h3>` + activePool.map(m => `<p>${m.title}</p>`).join('') + `<button onclick="document.getElementById('receiptOverlay').style.display='none'">[CLOSE]</button>`;
            document.getElementById('receiptOverlay').style.display = 'flex';
        }

        function triggerVhsRandomizer() {
            const m = activePool[Math.floor(Math.random() * activePool.length)];
            openModal(m);
        }

        document.getElementById('searchBar').oninput = renderGrid;
        fetchMovies();
    </script>
</body>
</html>
