<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5 Bag Cinema</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* 1. GOOGLE FONT IMPORT (VCR/Digital vibe) */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

* { box-sizing: border-box; }

:root {
    --vfa-maroon: #3d0000; 
    --vfa-black: #0a0a0a;  
    --vfa-grey: #1a1a1a;   
    --vfa-gold: #d4af37;   
    --vfa-vcr-green: #00ff41;
    --text-main: #d1d1d1;
}

body {
    font-family: 'Courier New', Courier, monospace;
    /* 2. THE VAULT SHELF: Dark Wood Texture Background */
    background: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&q=80&w=2069');
    background-size: cover;
    background-attachment: fixed;
    color: var(--text-main);
    margin: 0; padding: 0;
    overflow-x: hidden;
}

/* 3. STATIC NOISE OVERLAY: Adds moving film grain */
body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Average_Noise.png');
    opacity: 0.04;
    pointer-events: none;
    z-index: 9999;
    animation: noise 0.2s infinite;
}

@keyframes noise {
    0% { transform: translate(0,0) }
    10% { transform: translate(-1%,-1%) }
    20% { transform: translate(1%,1%) }
    30% { transform: translate(-2%,0) }
    40% { transform: translate(1%,-1%) }
    50% { transform: translate(-1%,1%) }
    60% { transform: translate(2%,2%) }
    70% { transform: translate(-1%,0) }
    80% { transform: translate(1%,-1%) }
    90% { transform: translate(0,1%) }
    100% { transform: translate(-1%,-1%) }
}

header {
    text-align: center;
    padding: 60px 10px;
    background-color: var(--vfa-maroon);
    border-top: 8px dotted var(--vfa-gold);
    border-bottom: 8px dotted var(--vfa-gold);
    box-shadow: inset 0 0 100px rgba(0,0,0,1), 0 15px 40px rgba(0,0,0,0.8);
}

h1 {
    font-size: 3.5rem; color: #fff; margin: 0; text-transform: uppercase;
    letter-spacing: 6px; font-weight: 900;
    text-shadow: 0 0 10px var(--vfa-gold), 0 0 30px var(--vfa-gold);
    animation: neon-flicker 4s infinite alternate;
}

/* 4. VCR CLOCK STYLE: Glowing Green Display */
#movieCount {
    margin-top: 25px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    color: var(--vfa-vcr-green);
    text-shadow: 0 0 10px var(--vfa-vcr-green);
    background: #000;
    padding: 8px 20px;
    border: 2px solid #222;
    display: inline-block;
    letter-spacing: 2px;
}

.controls {
    text-align: center;
    padding: 20px;
    position: sticky;
    top: 0;
    background: rgba(10, 10, 10, 0.95);
    z-index: 100;
    border-bottom: 2px solid var(--vfa-maroon);
}

input, select {
    padding: 10px; border: 1px solid var(--vfa-gold); margin: 5px;
    background: #000; color: var(--vfa-gold);
    font-family: 'Courier New', monospace; font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 30px; padding: 40px;
    max-width: 1300px; margin: 0 auto;
}

/* 5. THE PHYSICAL TAPE: Card Styling */
.card {
    background: #000;
    border: 1px solid #333;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    color: inherit;
    box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
}

/* VHS Plastic Sheen (Gloss) */
.card::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(
        45deg, 
        rgba(255,255,255,0) 45%, 
        rgba(255,255,255,0.08) 50%, 
        rgba(255,255,255,0) 55%
    );
    z-index: 2;
    pointer-events: none;
    transition: transform 0.6s;
}

.card:hover::before { transform: translate(10%, 10%); }

.card:hover {
    transform: translateY(-10px) rotateX(5deg);
    border-color: var(--vfa-gold);
    box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
}

.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; filter: sepia(0.2) contrast(1.1); }

.card-info { padding: 12px; background: #111; z-index: 3; position: relative; }

.card-title {
    font-size: 0.85rem; font-weight: 900; color: #fff;
    text-transform: uppercase; margin-bottom: 6px;
}

/* 6. CHROMATIC ABERRATION: Hover Glitch */
.card:hover .card-title {
    text-shadow: 2px 0 #ff0000, -2px 0 #00ffff;
    animation: glitch-text 0.3s infinite;
}

@keyframes glitch-text {
    0% { transform: translate(0) }
    20% { transform: translate(-1px, 1px) }
    40% { transform: translate(-1px, -1px) }
    60% { transform: translate(1px, 1px) }
    80% { transform: translate(1px, -1px) }
    100% { transform: translate(0) }
}

.badge {
    display: inline-block; padding: 3px 8px; font-size: 0.6rem;
    font-weight: 900; text-transform: uppercase;
    box-shadow: 2px 2px 0px #000;
}

.format-4k { background: #000; color: var(--vfa-gold); border: 1px solid var(--vfa-gold); }
.format-blu-ray { background: #0033cc; color: #fff; }
.format-vhs { background: var(--vfa-maroon); color: #fff; }

/* LEGEND BOX */
.legend-container {
    max-width: 800px; margin: 0 auto 30px; padding: 20px;
    background: #000; border: 3px double var(--vfa-gold);
}

@media (max-width: 600px) {
    h1 { font-size: 2rem; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
    .card-title { font-size: 0.6rem; }
}
    </style>
</head>
<body>

<header>
    <h1>5 Bag Cinema</h1>
    <p id="movieCount">CONNECTING TO VFA...</p>
</header>

<div class="controls">
    <input type="text" id="search" placeholder="SEARCH VAULT..." onkeyup="filterMovies()">
    <select id="genreFilter" onchange="filterMovies()">
        <option value="">ALL GENRES</option>
    </select>
</div>

<div class="legend-container">
    <div class="legend-title">VFA RATING KEY</div>
    <div class="legend-grid">
        <div class="legend-item"><span>🍿</span><span>NOT A MOVIE</span></div>
        <div class="legend-item"><span>🍿🍿</span><span>TOO MUCH MUSIC</span></div>
        <div class="legend-item"><span>🍿🍿🍿</span><span>SHORT RUNTIME</span></div>
        <div class="legend-item"><span>🍿🍿🍿🍿</span><span>NO SEAGAL</span></div>
        <div class="legend-item"><span>🍿🍿🍿🍿🍿</span><span>CLASSIC</span></div>
    </div>
</div>

<div id="status" style="text-align:center; padding:50px; color:var(--vfa-gold); font-weight:bold;">ACCESSING THE VAULT...</div>
<div class="grid" id="movieGrid"></div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1iMWEGHuDiopTZfWMNzasF8T29JIiYW_Tkm3nDxUkKTM/export?format=csv';

    let allMovies = [];

    // Helper to find data regardless of header capitalization or spaces
    function getVal(obj, key) {
        const lowerKey = key.toLowerCase().replace(/\s/g, '');
        for (let k in obj) {
            if (k.toLowerCase().replace(/\s/g, '') === lowerKey) return obj[k];
        }
        return "";
    }

    function init() {
        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Raw Data Samples:", results.data[0]);
                allMovies = results.data.filter(m => (getVal(m, 'Title')).trim() !== "");
                
                if (allMovies.length === 0) {
                    document.getElementById('status').innerHTML = "ERROR: NO MOVIES FOUND.<br>Check if your Google Sheet is 'Published to the Web' as a CSV.";
                    return;
                }

                document.getElementById('status').style.display = 'none';
                document.getElementById('movieCount').textContent = `${allMovies.length} TITLES SECURED`;
                populateFilters();
                displayMovies(allMovies);
            },
            error: function(err) {
                document.getElementById('status').textContent = "CONNECTION FAILURE.";
                console.error(err);
            }
        });
    }

    function displayMovies(data) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        data.forEach(movie => {
            const title = getVal(movie, 'Title') || "Untitled";
            const id = getVal(movie, 'IMDB_ID') || getVal(movie, 'IMDBID');
            const format = (getVal(movie, 'Format') || "VHS").trim();
            const poster = getVal(movie, 'Poster_URL') || getVal(movie, 'PosterURL');
            const ratingNum = parseInt(getVal(movie, 'Rating')) || 0;
            const popcornEmoji = "🍿".repeat(Math.max(0, Math.min(5, ratingNum)));

            let formatClass = "format-vhs";
            if (format.toLowerCase().includes("4k")) formatClass = "format-4k";
            else if (format.toLowerCase().includes("blu")) formatClass = "format-blu-ray";
            else if (format.toLowerCase().includes("dvd")) formatClass = "format-dvd";

            const card = document.createElement('a');
            card.className = 'card';
            card.href = id ? `https://www.imdb.com/title/${id}/` : "#";
            card.target = "_blank";
            card.innerHTML = `
                <img src="${poster}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=VFA+TAPE'">
                <div class="card-info">
                    <div class="card-title">${title}</div>
                    <div class="rating-box">${popcornEmoji}</div>
                    <div class="badge ${formatClass}">${format}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function populateFilters() {
        const genres = [...new Set(allMovies.map(m => getVal(m, 'Genre')).filter(Boolean))].sort();
        const select = document.getElementById('genreFilter');
        genres.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g; opt.textContent = g.toUpperCase();
            select.appendChild(opt);
        });
    }

    function filterMovies() {
        const term = document.getElementById('search').value.toLowerCase();
        const genre = document.getElementById('genreFilter').value;
        const filtered = allMovies.filter(m => {
            const mTitle = getVal(m, 'Title').toLowerCase();
            const mDirector = getVal(m, 'Director').toLowerCase();
            const mActors = getVal(m, 'Actors').toLowerCase();
            const mGenre = getVal(m, 'Genre');
            const matchSearch = mTitle.includes(term) || mDirector.includes(term) || mActors.includes(term);
            const matchGenre = genre === "" || mGenre === genre;
            return matchSearch && matchGenre;
        });
        displayMovies(filtered);
    }

    window.onload = init;
</script>
</body>
</html>
