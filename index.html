<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-BAG CINEMA | NEON ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --bg-black: #050505;
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-cyan);
            font-family: 'VT323', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            /* Synthwave Grid Floor Effect */
            background-image: 
                linear-gradient(transparent 0%, var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, transparent 0%, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* CRT Scanline Animation */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 3px solid var(--neon-pink);
            padding: 30px 10px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 5px;
            margin: 0 0 15px 0;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            font-style: italic;
        }

        #searchBar {
            width: 90%; max-width: 500px;
            background: #000;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            font-size: 1.5rem;
            font-family: 'VT323', monospace;
            outline: none;
            box-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase;
        }

        .genre-console {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin-top: 20px;
        }

        .genre-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'VT323', monospace;
        }

        .genre-btn.active {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* MOVIE GRID */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tape-case {
            background: #000;
            border: 2px solid #222;
            padding: 8px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            box-shadow: 5px 5px 0px var(--neon-purple);
        }

        .tape-case:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-10px) rotate(1deg);
