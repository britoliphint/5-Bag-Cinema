<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tomboatwater.com | VFA Archivist</title>
    <style>
        :root {
            --vcr-green: #00ff41;
            --vcr-green-dim: rgba(0, 255, 65, 0.2);
            --bg-dark: #050505;
            --text-main: #f0e6d2;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(rgba(0,10,5,0.85), rgba(0,10,5,0.85)),
                        url('https://images.unsplash.com/photo-1620021666992-a1f7c00609b1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--vcr-green);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* VINTAGE SCANLINE EFFECT */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        header {
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid var(--vcr-green);
            padding: 30px 20px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }

        h1 { letter-spacing: 5px; font-size: 1.5rem; margin-bottom: 20px; }

        #searchBar {
            width: 90%; max-width: 600px;
            background: #000;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            padding: 15px;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--vcr-green-dim);
            outline: none;
        }

        /* GENRE CONSOLE */
        .genre-console {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .genre-btn {
            background: #000;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            padding: 8px 15px;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .genre-btn:hover { background: var(--vcr-green-dim); }
        .genre-btn.active { background: var(--vcr-green); color: #000; box-shadow: 0 0 15px var(--vcr-green); }

        /* THE GRID: 4 per row on Desktop */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 30px;
            padding: 40px;
        }

        @media (min-width: 1024px) {
            .movie-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 1200px;
                margin: 0 auto;
            }
        }

        .tape-case {
            background: #000;
            border: 1px solid #222;
            padding: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: flicker 0.2s infinite secondary;
        }

        @keyframes flicker {
            0% { opacity: 0.99; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .tape-case:hover {
            border-color: var(--vcr-green);
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--vcr-green-dim);
        }

        .poster {
            width: 100%; aspect-ratio: 2/3;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.1);
        }

        /* NOSTROMO DOSSIER (MODAL) */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .dossier-window {
            background: #050505;
            border: 2px solid var(--vcr-green);
            width: 95%; max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            display: flex; flex-wrap: wrap;
            box-shadow: 0 0 40px var(--vcr-green-dim);
        }

        .dossier-poster {
            flex: 1 1 350px;
            max-height: 600px;
            object-fit: contain;
            background: #000;
            border-right: 1px solid var(--vcr-green);
        }

        .dossier-content {
            flex: 1 1 350px;
            padding: 40px;
            display: flex; flex-direction: column;
        }

        .dossier-title {
            font-size: 2rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--vcr-green);
            padding-bottom: 10px;
        }

        .data-line { margin: 12px 0; font-size: 1rem; line-height: 1.5; }
        .label { color: #666; text-transform: uppercase; margin-right: 10px; font-weight: bold; }

        .imdb-btn {
            margin-top: auto;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--vcr-green);
            color: var(--vcr-green);
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
            letter-spacing: 2px;
        }

        .imdb-btn:hover { background: var(--vcr-green); color: #000; }

        .close-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 1.5rem; cursor: pointer; color: var(--vcr-green);
            z-index: 101;
        }

        @media (max-width: 768px) {
            .dossier-window { width: 100%; height: 100%; max-height: 100vh; border: none; overflow-x: hidden; }
            .dossier-poster { border-right: none; border-bottom: 1px solid var(--vcr-green); max-height: 40vh; }
            .movie-grid { padding: 20px; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SEAGAL CINEMA</h1>
        <input type="text" id="searchBar" placeholder="RETRIEVE DATA: SEARCH TITLES, CAST, OR GENRE...">
        <div id="genreContainer" class="genre-console"></div>
    </header>

    <div class="movie-grid" id="movieGrid"></div>

    <div id="modalOverlay">
        <div class="dossier-window">
            <span class="close-btn" onclick="closeDossier()">[X] CLOSE_FILE</span>
            <img id="modalPoster" class="dossier-poster" src="" alt="">
            <div class="dossier-content">
                <div class="dossier-title" id="modalTitle"></div>
                <div class="data-line"><span class="label">GENRE:</span> <span id="modalGenre"></span></div>
                <div class="data-line"><span class="label">YEAR:</span> <span id="modalYear"></span></div>
                <div class="data-line"><span class="label">DIRECTOR:</span> <span id="modalDirector"></span></div>
                <div class="data-line"><span class="label">CAST:</span> <span id="modalActors"></span></div>
                <div class="data-line"><span class="label">RATING:</span> <span id="modalRating"></span></div>
                <a href="#" id="modalImdb" target="_blank" class="imdb-btn">[ > ] ACCESS EXTERNAL_IMDB_DATABASE</a>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR CSV LINK HERE
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0lCS-r1idsXlI-r1hzwww4jLVWuCiKlSYCrua2uMKCN_L8xipIXaMhpWYOw8PpeW8M6gHcHd3bA7V/pub?gid=0&single=true&output=csv';

        let allMovies = [];
        let currentGenre = 'ALL';

        async function loadMovies() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                
                allMovies = [];
                const genres = new Set(['ALL']);

                rows.forEach(row => {
                    // This Regex handles commas inside quotes correctly
                    const col = row.match(/(".*?"|[^",\s][^",]*|(?<=,|^)(?=,|$))/g);
                    if (!col || col.length < 8) return;
                    
                    const clean = col.map(c => c.replace(/^"|"$/g, '').trim());
                    const [title, genre, year, director, actors, poster, rating, imdbId] = clean;

                    if (!poster || !poster.startsWith('http')) return;

                    allMovies.push({ title, genre, year, director, actors, poster, rating, imdbId });
                    
                    // Add genres to the toggle list
                    genre.split(',').forEach(g => genres.add(g.trim().toUpperCase()));
                });

                renderGenreToggles(Array.from(genres).sort());
                applyFilters();
            } catch (err) {
                console.error("Archive Retrieval Error:", err);
            }
        }

        function renderGenreToggles(genres) {
            const container = document.getElementById('genreContainer');
            container.innerHTML = '';
            genres.forEach(g => {
                const btn = document.createElement('button');
                btn.className = `genre-btn ${currentGenre === g ? 'active' : ''}`;
                btn.innerText = g;
                btn.onclick = () => { currentGenre = g; applyFilters(); };
                container.appendChild(btn);
            });
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';

            allMovies.forEach(movie => {
                const matchesGenre = currentGenre === 'ALL' || movie.genre.toUpperCase().includes(currentGenre);
                const matchesSearch = movie.title.toLowerCase().includes(searchTerm) || 
                                      movie.actors.toLowerCase().includes(searchTerm) ||
                                      movie.director.toLowerCase().includes(searchTerm);

                if (matchesGenre && matchesSearch) {
                    const card = document.createElement('div');
                    card.className = 'tape-case';
                    card.onclick = () => openDossier(movie);
                    card.innerHTML = `<img class="poster" src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=DATA_CORRUPT'">`;
                    grid.appendChild(card);
                }
            });

            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === currentGenre);
            });
        }

        function openDossier(movie) {
            document.getElementById('modalTitle').innerText = movie.title.toUpperCase();
            document.getElementById('modalGenre').innerText = movie.genre;
            document.getElementById('modalYear').innerText = movie.year;
            document.getElementById('modalDirector').innerText = movie.director;
            document.getElementById('modalActors').innerText = movie.actors;
            document.getElementById('modalRating').innerText = movie.rating;
            document.getElementById('modalPoster').src = movie.poster;
            document.getElementById('modalImdb').href = `https://www.imdb.com/title/${movie.imdbId.trim()}/`;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        function closeDossier() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto'; // Resume scrolling
        }

        window.onclick = (event) => {
            if (event.target == document.getElementById('modalOverlay')) closeDossier();
        }

        document.getElementById('searchBar').addEventListener('input', applyFilters);

        loadMovies();
    </script>
</body>
</html>
